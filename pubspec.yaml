name: bowling_diary
description: "볼링 기록 & 분석 앱 - 나의 볼링 성장 일기장"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.6.3

  # 백엔드
  supabase_flutter: ^2.8.4

  # 차트
  fl_chart: ^0.69.0

  # 이미지
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # 유틸리티
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/splash_logo.png
  color_dark: "#0D0D0D"
  image_dark: assets/splash_logo.png
  android_12:
    color: "#0D0D0D"
    image: assets/splash_logo.png
    color_dark: "#0D0D0D"
    image_dark: assets/splash_logo.png
  ios: true
  android: true

flutter:
  uses-material-design: true
  assets:
    - assets/
